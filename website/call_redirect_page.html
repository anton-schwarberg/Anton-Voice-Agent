<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viel Spaß mit dem Anruf</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .call-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 32px;
            line-height: 1.3;
        }

        .phone-icon {
            font-size: 24px;
            margin-left: 8px;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s ease;
            background-color: #fafafa;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: white;
        }

        .phone-input-container {
            display: flex;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background-color: #fafafa;
            transition: border-color 0.2s ease;
        }

        .phone-input-container:focus-within {
            border-color: #3b82f6;
            background-color: white;
        }

        .phone-input-container.input-error {
            border-color: #f56565 !important;
        }

        .country-code {
            display: flex;
            align-items: center;
            padding: 16px 12px;
            background-color: #e2e8f0;
            font-size: 16px;
            font-weight: 500;
            color: #4a5568;
            border-radius: 6px 0 0 6px;
            border-right: 1px solid #cbd5e0;
        }

        input[type="tel"] {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 0 6px 6px 0;
            font-size: 16px;
            background-color: transparent;
        }

        input[type="tel"]:focus {
            outline: none;
        }

        input[type="text"]::placeholder,
        input[type="tel"]::placeholder {
            color: #a0aec0;
        }

        .call-button {
            width: 100%;
            padding: 16px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .call-button:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }

        .call-button:active {
            transform: translateY(1px);
        }

        .call-button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        .success-message {
            background-color: #f0f9ff;
            color: #1e40af;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #bfdbfe;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .error-message {
            background-color: #fee;
            color: #c53030;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #fecaca;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            display: none;
            margin-top: 16px;
            color: #666;
            font-size: 14px;
        }

        .loading.show {
            display: block;
        }

        .validation-error {
            color: #c53030;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .validation-error.show {
            display: block;
        }

        .input-error {
            border-color: #f56565 !important;
        }

        .token-validation {
            display: block;
            margin-top: 16px;
            color: #666;
            font-size: 14px;
        }

        .token-validation.hide {
            display: none;
        }
    </style>
</head>
<body>
    <div class="call-container">
        <h1>Viel Spaß mit dem Anruf <span class="phone-icon">📞</span></h1>
        
        <div class="success-message" id="successMessage">
            Anruf wurde erfolgreich initiiert!
        </div>
        
        <div class="error-message" id="errorMessage">
            Fehler beim Initiieren des Anrufs. Bitte versuche es nochmal.
        </div>

        <div class="token-validation" id="tokenValidation">
            Token wird überprüft...
        </div>

        <form id="callForm" style="display: none;">
            <div class="form-group">
                <label for="name">Vorname</label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    placeholder="Name"
                    required
                >
                <div class="validation-error" id="nameError">
                    Bitte gib einen gültigen Namen ein.
                </div>
            </div>
            
            <div class="form-group">
                <label for="phone">Telefonnummer</label>
                <div class="phone-input-container">
                    <span class="country-code">+49</span>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        placeholder="15751234567"
                        required
                    >
                </div>
                <div class="validation-error" id="phoneError">
                    Bitte gib eine gültige Telefonnummer ein.
                </div>
            </div>
            
            <button type="submit" class="call-button" id="callButton">
                Anrufen
            </button>
        </form>

        <div class="loading" id="loadingMessage">
            Anruf wird initiiert...
        </div>
    </div>

    <script>
    const API_KEY = '<MAKE_API_KEY>'; // Replace with your Make API key before deploy
    const TOKEN_CHECK_URL = '<API_GATEWAY_URL>/checktoken'; // Replace with your API Gateway URL before deploy
    
    let webhookUrl = null;

    function getTokenFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('token');
    }

    async function validateToken(token) {
        try {
            const response = await fetch(TOKEN_CHECK_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ token: token })
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const result = await response.json();
            
            // Überprüfe, ob die Antwort ein Webhook-URL ist oder false
            if (result === false || result === 'false') {
                return { valid: false, webhook: null };
            } else {
                // Annahme: Wenn Token gültig ist, wird der Webhook-URL zurückgegeben
                return { valid: true, webhook: result.webhook || result };
            }
        } catch (error) {
            console.error('❌ Token-Validierung fehlgeschlagen:', error);
            return { valid: false, webhook: null };
        }
    }

    function redirectToIndex() {
        window.location.href = 'index.html';
    }

    function validateName(name) {
        return name.trim().length >= 2 && /^[a-zA-ZäöüÄÖÜß\s]+$/.test(name.trim());
    }

    function validatePhone(phone) {
        const phoneRegex = /^[\d\s\-\(\)]{8,15}$/;
        return phoneRegex.test(phone.trim());
    }

    async function callWebhook(name, phone) {
        if (!webhookUrl) {
            throw new Error('Kein gültiger Webhook verfügbar');
        }

        const payload = {
            name: name.trim(),
            phone: phone.trim(),
            timestamp: new Date().toISOString(),
            action: 'initiate_call'
        };

        console.log("➡️ Sende Payload an Webhook:", payload);

        const response = await fetch(webhookUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-make-apikey': API_KEY
            },
            body: JSON.stringify(payload)
        });

        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }

        return await response.text();
    }

    // Token-Validierung beim Laden der Seite
    window.addEventListener('load', async function() {
        const token = getTokenFromUrl();
        const tokenValidationElement = document.getElementById('tokenValidation');
        const callForm = document.getElementById('callForm');

        if (!token) {
            console.error('❌ Kein Token in URL gefunden');
            tokenValidationElement.textContent = 'Kein Token gefunden. Weiterleitung...';
            setTimeout(redirectToIndex, 2000);
            return;
        }

        console.log('🔍 Überprüfe Token:', token);

        const validationResult = await validateToken(token);

        if (validationResult.valid) {
            console.log('✅ Token gültig, Webhook erhalten:', validationResult.webhook);
            webhookUrl = validationResult.webhook;
            tokenValidationElement.classList.add('hide');
            callForm.style.display = 'block';
        } else {
            console.log('❌ Token ungültig, Weiterleitung zu index.html');
            tokenValidationElement.textContent = 'Token ungültig. Weiterleitung...';
            setTimeout(redirectToIndex, 2000);
        }
    });

    document.getElementById('name').addEventListener('input', function () {
        const nameInput = this;
        const nameError = document.getElementById('nameError');

        if (nameInput.value && !validateName(nameInput.value)) {
            nameInput.classList.add('input-error');
            nameError.classList.add('show');
        } else {
            nameInput.classList.remove('input-error');
            nameError.classList.remove('show');
        }
    });

    document.getElementById('phone').addEventListener('input', function () {
        const phoneInput = this;
        const phoneError = document.getElementById('phoneError');
        const phoneContainer = document.querySelector('.phone-input-container');

        if (phoneInput.value && !validatePhone(phoneInput.value)) {
            phoneContainer.classList.add('input-error');
            phoneError.classList.add('show');
        } else {
            phoneContainer.classList.remove('input-error');
            phoneError.classList.remove('show');
        }
    });

    document.getElementById('callForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const callButton = document.getElementById('callButton');
        const loadingMessage = document.getElementById('loadingMessage');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');

        let isValid = true;

        if (!validateName(name)) {
            document.getElementById('name').classList.add('input-error');
            document.getElementById('nameError').classList.add('show');
            isValid = false;
        }

        if (!validatePhone(phone)) {
            document.querySelector('.phone-input-container').classList.add('input-error');
            document.getElementById('phoneError').classList.add('show');
            isValid = false;
        }

        if (!isValid) return;

        callButton.disabled = true;
        callButton.textContent = 'Wird initiiert...';
        loadingMessage.classList.add('show');
        successMessage.classList.remove('show');
        errorMessage.classList.remove('show');

        try {
            const result = await callWebhook(name, '+49' + phone.replace(/\s/g, ''));

            console.log('✅ Webhook-Antwort:', result);

            successMessage.classList.add('show');
            callButton.textContent = 'Anruf gestartet!';
            callButton.style.backgroundColor = '#10b981';

            setTimeout(() => {
                document.getElementById('callForm').reset();
                callButton.disabled = false;
                callButton.textContent = 'Anrufen';
                callButton.style.backgroundColor = '#3b82f6';
                successMessage.classList.remove('show');
            }, 3000);
        } catch (error) {
            console.error('❌ Webhook-Fehler:', error);
            errorMessage.classList.add('show');
            callButton.disabled = false;
            callButton.textContent = 'Anrufen';
        } finally {
            loadingMessage.classList.remove('show');
        }
    });
    </script>
</body>
</html>
