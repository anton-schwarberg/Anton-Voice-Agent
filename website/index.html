<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willkommen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 32px;
        }

        .error-message {
            background-color: #fee;
            color: #c53030;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #fecaca;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .form-group {
            margin-bottom: 24px;
        }

        input[type="password"] {
            width: 100%;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s ease;
            background-color: #fafafa;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: white;
        }

        input[type="password"]::placeholder {
            color: #a0aec0;
        }

        .submit-button {
            width: 100%;
            padding: 16px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .submit-button:hover {
            background-color: #2563eb;
        }

        .submit-button:active {
            transform: translateY(1px);
        }

        .submit-button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            margin-top: 16px;
            color: #666;
            font-size: 14px;
        }

        .loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Willkommen!</h1>
        <p class="subtitle">Bitte gib das Passwort ein</p>
        
        <div class="error-message" id="errorMessage">
            Versuch es nochmal!
        </div>

        <form id="loginForm">
            <div class="form-group">
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Passwort"
                    required
                >
            </div>
            
            <button type="submit" class="submit-button" id="submitButton">
                Weiter
            </button>
        </form>

        <div class="loading" id="loadingMessage">
            Überprüfung läuft...
        </div>
    </div>

    <script>
    async function validatePassword(password) {
        const apiUrl = "<API_GATEWAY_URL>/checkpw"; // Replace with your API Gateway URL before deploy

        try {
            const response = await fetch(apiUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ passwort: password })
            });

            if (!response.ok) {
                throw new Error("Netzwerkfehler oder ungültige Antwort");
            }

            const data = await response.json();
            return {
                success: data.success === true,
                token: data.token,
                expiresAt: data.expiresAt
            };

        } catch (error) {
            console.error("Fehler beim API-Aufruf:", error);
            throw error;
        }
    }

    // Form-Handler
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const password = document.getElementById('password').value;
        const submitButton = document.getElementById('submitButton');
        const loadingMessage = document.getElementById('loadingMessage');
        const errorMessage = document.getElementById('errorMessage');

        // UI für Loading-Zustand
        submitButton.disabled = true;
        submitButton.textContent = 'Wird überprüft...';
        loadingMessage.classList.add('show');
        errorMessage.classList.remove('show');

        try {
            // API aufrufen
            const result = await validatePassword(password);

            if (result.success) {
                submitButton.textContent = 'Erfolgreich!';
                submitButton.style.backgroundColor = '#10b981';

                setTimeout(() => {
                    const token = encodeURIComponent(result.token);
                    window.location.href = `call_redirect_page.html?token=${token}`;
                }, 500);
            } else {
                errorMessage.classList.add('show');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }

        } catch (error) {
            errorMessage.textContent = 'Ein Fehler ist aufgetreten. Versuche es später nochmal.';
            errorMessage.classList.add('show');
        } finally {
            submitButton.disabled = false;
            submitButton.textContent = 'Weiter';
            loadingMessage.classList.remove('show');
        }
    });

    // Enter-Taste im Passwort-Feld
    document.getElementById('password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }
    });
</script>
</body>
</html>
